<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home & Garden | ClickDash</title>
    <link rel="icon" type="image/png" href="images/favcon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="products.css" />
  </head>
  <body>
    <header>
      <a href="index.html">
        <img
          src="images/clickdash-removebg-preview.png"
          alt="ClickDash Logo"
        />
      </a>

      <div style="display: flex; align-items: center; gap: 20px">
        <button
          id="dark-mode-toggle"
          style="
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
          "
          aria-label="Toggle Dark Mode"
        >
          🌙
        </button>

        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="40"
          height="40"
          viewBox="0 0 50 50"
          id="menu-icon"
          fill="white"
        >
          <path
            d="M 3 9 A 1.0001 1.0001 0 1 0 3 11 L 47 11 A 1.0001 1.0001 0 1 0 47 9 L 3 9 z M 3 24 A 1.0001 1.0001 0 1 0 3 26 L 47 26 A 1.0001 1.0001 0 1 0 47 24 L 3 24 z M 3 39 A 1.0001 1.0001 0 1 0 3 41 L 47 41 A 1.0001 1.0001 0 1 0 47 39 L 3 39 z"
          ></path>
        </svg>
      </div>
    </header>

    <nav id="menu-con">
      <ul id="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Profile</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <main>
      <div class="category-header">
        <h1>Home & Garden</h1>
        <p>
          Upgrade your living space with our premium home and outdoor
          essentials.
        </p>
      </div>

      <section class="products-grid">
        <div class="product-card">
          <div class="img-container">
            <img src="images/home-garden.jpg" alt="Ceramic Planter" />
          </div>
          <div class="product-info">
            <h3>Ceramic Planter Set</h3>
            <p class="price">$34.99</p>
            <button class="add-to-cart">Add to Cart</button>
          </div>
        </div>

        <div class="product-card">
          <div class="img-container">
            <img src="images/home-garden.jpg" alt="Robot Vacuum" />
          </div>
          <div class="product-info">
            <h3>Smart Robot Vacuum</h3>
            <p class="price">$249.00</p>
            <button class="add-to-cart">Add to Cart</button>
          </div>
        </div>

        <div class="product-card">
          <div class="img-container">
            <img src="images/home-garden.jpg" alt="Outdoor Chair" />
          </div>
          <div class="product-info">
            <h3>Woven Patio Chair</h3>
            <p class="price">$85.00</p>
            <button class="add-to-cart">Add to Cart</button>
          </div>
        </div>

        <div class="product-card">
          <div class="img-container">
            <img src="images/home-garden.jpg" alt="LED Bulbs" />
          </div>
          <div class="product-info">
            <h3>Smart LED Bulb (4-Pack)</h3>
            <p class="price">$29.99</p>
            <button class="add-to-cart">Add to Cart</button>
          </div>
        </div>
      </section>
    </main>

    <footer id="contact">
      <p>&copy; 2026 ClickDash. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
