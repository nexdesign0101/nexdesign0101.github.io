<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forget Password | ClickDash</title>
    <link rel="icon" type="image/png" href="images/favcon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="auth-container">
      <a href="index.html">
        <img
          src="images/clickdash-removebg-preview.png"
          alt="ClickDash Logo"
        />
      </a>
      <h2>Reset Password</h2>
      <form action="login.html" method="GET">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <button type="submit" class="submit-btn">Send Reset Link</button>
      </form>
      <div class="auth-links">
        <p>Remember your password? <a href="login.html">Login</a></p>
        <p><br />Don't have an account? <a href="sign-up.html">Sign Up</a></p>
      </div>
    </div>
  </body>
</html>
